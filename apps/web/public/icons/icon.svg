<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe zone: content within inner 80% -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g fill="white" opacity="0.95">
    <!-- Left weight plate -->
    <rect x="72" y="208" width="36" height="96" rx="10"/>
    <!-- Left bar collar -->
    <rect x="108" y="224" width="24" height="64" rx="6"/>
    <!-- Center bar -->
    <rect x="132" y="236" width="248" height="40" rx="8"/>
    <!-- Right bar collar -->
    <rect x="380" y="224" width="24" height="64" rx="6"/>
    <!-- Right weight plate -->
    <rect x="404" y="208" width="36" height="96" rx="10"/>
  </g>
</svg>
