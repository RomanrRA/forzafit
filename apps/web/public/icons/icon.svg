<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Основной градиент фона -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Радиальный блик сверху -->
    <radialGradient id="glow" cx="45%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <!-- Градиент молнии -->
    <linearGradient id="bolt-grad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <!-- Тень молнии -->
    <filter id="bolt-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#4C1D95" flood-opacity="0.5"/>
    </filter>
    <!-- Мягкое свечение молнии -->
    <filter id="bolt-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Фон (заливает всё — нужно для maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Радиальный блик -->
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- Нижний тёмный градиент для глубины -->
  <rect width="512" height="512" fill="url(#depth)" opacity="0.3"/>

  <!--
    Молния — контент строго в safe zone maskable иконки:
    safe zone = inner 80% → отступ 51px с каждой стороны → область 51..461
    Молния центрирована: x: 155–357, y: 78–434
  -->

  <!-- Тень/свечение молнии (фоновый слой) -->
  <path d="M 300 78
           L 155 295
           L 242 295
           L 208 434
           L 357 217
           L 268 217
           Z"
        fill="white"
        opacity="0.15"
        filter="url(#bolt-shadow)"
        transform="translate(6, 6)"/>

  <!-- Основная молния -->
  <path d="M 300 78
           L 155 295
           L 242 295
           L 208 434
           L 357 217
           L 268 217
           Z"
        fill="url(#bolt-grad)"
        filter="url(#bolt-shadow)"/>

  <!-- Блик на молнии (стекло/металл эффект) -->
  <path d="M 300 78
           L 220 215
           L 268 215
           Z"
        fill="white"
        opacity="0.35"/>
</svg>
