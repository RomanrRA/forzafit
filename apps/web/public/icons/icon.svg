<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Accent gradient bg -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0a8a3a"/>
    </linearGradient>
    <!-- Радиальный блик сверху-слева -->
    <radialGradient id="glow" cx="40%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Тень пламени -->
    <filter id="flame-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#053b18" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Фон: заполняет всё (нужно для maskable purpose) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Лёгкий блик -->
  <rect width="512" height="512" fill="url(#glow)"/>

  <!--
    Иконка пламени lucide-react `Flame`:
      M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z
    Размер 24 → масштабируем в 256px (× 10.667). Центрируем в (128,128).
    Контент остаётся в safe zone 80% (51px отступ) ⇒ icon в (128..384) — норм.
  -->
  <g transform="translate(128, 128) scale(10.667)"
     fill="none"
     stroke="#ffffff"
     stroke-width="2.4"
     stroke-linecap="round"
     stroke-linejoin="round"
     filter="url(#flame-shadow)">
    <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
  </g>
</svg>
