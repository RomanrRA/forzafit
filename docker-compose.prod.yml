services:
  postgres:
    image: postgres:16-alpine
    container_name: fitlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitlog
      POSTGRES_USER: fitlog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=32MB
      -c max_connections=20
      -c effective_cache_size=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitlog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitlog-redis
    restart: unless-stopped
    command: redis-server --maxmemory 24mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fitlog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://fitlog:${POSTGRES_PASSWORD}@fitlog-postgres:5432/fitlog
      REDIS_URL: redis://fitlog-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_BACKEND_URL: http://fitlog-backend:3001
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    container_name: fitlog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_BACKEND_URL: http://fitlog-backend:3001
      PORT: 3000
      HOSTNAME: 0.0.0.0

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: fitlog_default
  n8n-nginx_default:
    external: true
