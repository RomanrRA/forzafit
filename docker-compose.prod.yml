services:
  postgres:
    image: postgres:16-alpine
    container_name: forzafit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitlog
      POSTGRES_USER: fitlog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=32MB
      -c max_connections=20
      -c effective_cache_size=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitlog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: forzafit-redis
    restart: unless-stopped
    command: redis-server --maxmemory 24mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: forzafit-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - nginx-shared
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://fitlog:${POSTGRES_PASSWORD}@forzafit-postgres:5432/fitlog
      REDIS_URL: redis://forzafit-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      AI_MODEL: ${AI_MODEL}

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_BACKEND_URL: http://forzafit-backend:3001
    container_name: forzafit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - nginx-shared
    environment:
      NODE_ENV: production
      NEXT_BACKEND_URL: http://forzafit-backend:3001
      PORT: 3000
      HOSTNAME: 0.0.0.0

volumes:
  postgres_data:
    external: true
    name: fitlog_postgres_data
  redis_data:
    external: true
    name: fitlog_redis_data

networks:
  # Внутренняя сеть проекта — postgres/redis/backend/frontend.
  default:
    name: forzafit_default
  # Общая сеть с nginx-контейнером (n8n-nginx). Создаётся вручную:
  #   docker network create nginx-shared
  # Туда же подключены приложения других проектов под этим nginx.
  nginx-shared:
    external: true
