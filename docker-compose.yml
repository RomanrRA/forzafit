version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forzafit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitlog
      POSTGRES_PASSWORD: fitlog
      POSTGRES_DB: fitlog
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fitlog -d fitlog']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forzafit_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
